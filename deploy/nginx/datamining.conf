# =====================================================================
# Nginx — Sistem Prediksi Kelayakan Beasiswa (Data Mining)
#
# SATU tempat untuk mengubah alamat backend API: blok `upstream` di bawah.
# Bila port/host backend berubah, cukup ubah baris `server ...;` di upstream.
#
# Frontend memanggil API lewat path "/api" (lihat frontend/.env -> VITE_API_BASE),
# dan nginx meneruskannya ke backend. PENTING: trailing slash pada `proxy_pass`
# (http://datamining_api/) menghapus prefix "/api" sehingga "/api/predict"
# diteruskan menjadi "/predict" (sesuai route FastAPI yang berada di root).
# =====================================================================

# --- Alamat backend (ubah di sini saja bila berpindah port/host) ---
upstream datamining_api {
    server 127.0.0.1:8005;
}

# --- Redirect HTTP -> HTTPS ---
server {
    listen 80;
    server_name datamining.kevienstudio.my.id www.datamining.kevienstudio.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;

    server_name
        datamining.kevienstudio.my.id
        www.datamining.kevienstudio.my.id;

    # Arahkan ke hasil build frontend (vite build -> folder dist).
    root /home/olyzano/projects/dataminining/client/dist;
    index index.html;

    # SSL
    ssl_certificate     /etc/nginx/ssl/kevienstudio.pem;
    ssl_certificate_key /etc/nginx/ssl/kevienstudio.key;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Sembunyikan versi nginx
    server_tokens off;

    # Batas ukuran body (cukup untuk payload prediksi)
    client_max_body_size 2m;

    # --- Reverse Proxy API ---
    # Letakkan SEBELUM lokasi SPA agar tidak tertangkap fallback index.html.
    location /api/ {
        # Trailing slash WAJIB: menghapus prefix /api sebelum diteruskan.
        proxy_pass http://datamining_api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # --- Frontend SPA React ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset statis hasil build
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
